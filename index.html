<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valaritas Clicker</title>
  
  <!-- Open Graph for Telegram link preview -->
  <meta property="og:title" content="⚡ Valaritas Clicker">
  <meta property="og:description" content="Tap to play!">
  <meta property="og:image" content="https://yagotobi.github.io/valaritas-miniapp/preview.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yagotobi.github.io/valaritas-miniapp/">
  
  <!-- Telegram specific -->
  <meta name="telegram:channel" content="@Valaritas_bot">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    
    h1 {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .counter {
      font-size: 6rem;
      font-weight: 700;
      margin: 20px 0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    
    .click-btn {
      background: white;
      color: #764ba2;
      border: none;
      padding: 20px 60px;
      font-size: 1.5rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .click-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .info {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
    
    .param-display {
      margin-top: 15px;
      font-size: 0.8rem;
      opacity: 0.6;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Valaritas Clicker</h1>
    <div class="counter" id="count">0</div>
    <button class="click-btn" id="clickBtn">TAP</button>
    <div class="info">Testing Mini App integration</div>
    <div class="param-display" id="params"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
    
    const params = new URLSearchParams(window.location.search);
    const startParam = tg?.initDataUnsafe?.start_param || '';
    
    let startCount = 0;
    if (startParam) {
      const parts = startParam.split('_');
      for (let i = 0; i < parts.length - 1; i += 2) {
        if (parts[i] === 'start') {
          startCount = parseInt(parts[i + 1]) || 0;
        }
      }
    }
    startCount = parseInt(params.get('start')) || startCount;
    
    let count = startCount;
    const countEl = document.getElementById('count');
    const paramsEl = document.getElementById('params');
    
    countEl.textContent = count;
    
    const allParams = startParam ? `startapp: ${startParam}` : `query: ${window.location.search || '(none)'}`;
    paramsEl.textContent = allParams;
    
    document.getElementById('clickBtn').addEventListener('click', () => {
      count++;
      countEl.textContent = count;
      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
    });
  </script>
</body>
</html>
